<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Свадебное приглашение</title>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('images/background3.jpg');
            background-repeat: repeat-y;
            background-size: 100% auto;
            background-position: top center;
            font-family: 'Montserrat', sans-serif;
            color: #2c2b28;
            line-height: 1.4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: transparent;
            padding: 0;
        }

        .section {
            margin-bottom: 0;
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .image-placeholder {
            width: 100%;
            background-color: transparent;
            min-height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            line-height: 0;
        }
        .image-placeholder img {
            width: 100%;
            height: auto;
            display: block;
        }
        .placeholder-note {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            background: #f0efed;
            padding: 40px 20px;
            width: 100%;
        }

        h2, .section-title {
            font-family: 'Pangolin', cursive;
            font-size: 28px;
            margin-bottom: 20px;
            margin-top: 20px;
            font-weight: normal;
            text-align: center;
            color: #4a3729;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
            padding: 0 20px;
        }
        .countdown-item {
            flex: 1;
            text-align: center;
            padding: 12px 5px;
        }
        .countdown-number {
            font-size: 38px;
            font-weight: 700;
            color: #bc8f6b;
        }
        .countdown-label {
            font-size: 14px;
            text-transform: uppercase;
            margin-top: 8px;
            color: #8b6b50;
        }

        .map-button-wrapper {
            text-align: center;
            margin: 20px 0;
            padding: 0 20px;
        }
        .btn-map {
            display: inline-block;
            background: #fff;
            border: 2px solid #bc8f6b;
            padding: 14px 32px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 18px;
            color: #bc8f6b;
            text-decoration: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .btn-map:hover {
            background: #bc8f6b;
            color: #fff;
        }

        .poll-container {
            margin: 20px 0;
            padding: 0 20px;
        }
        .poll-question {
            margin-bottom: 24px;
        }
        .poll-question p {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .poll-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .checkbox-circle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .checkbox-circle input {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #bc8f6b;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }
        .checkbox-circle input:checked {
            background-color: #bc8f6b;
            box-shadow: inset 0 0 0 4px white;
        }
        .poll-input {
            width: 100%;
            padding: 12px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            border: 1px solid #ddd7d0;
            background: white;
            border-radius: 40px;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .radio-circle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .radio-circle input {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #bc8f6b;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }
        .radio-circle input:checked {
            background-color: #bc8f6b;
            box-shadow: inset 0 0 0 4px white;
        }
        .btn-submit-poll {
            background: white;
            border: 2px solid #bc8f6b;
            padding: 12px 24px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: #bc8f6b;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn-submit-poll:hover {
            background: #bc8f6b;
            color: white;
        }
        .poll-status {
            margin-top: 14px;
            font-size: 14px;
            text-align: center;
        }
        @media (max-width: 550px) {
            .container { padding: 0; }
            .section { margin-bottom: 0; }
            h2, .section-title { font-size: 26px; }
            .countdown-number { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- 8 изображений photo 1.png до photo 8.png -->
        <div class="section"><div class="image-placeholder"><img src="images/photo 1.png" alt="Фото 1"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 2.png" alt="Фото 2"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 3.png" alt="Фото 3"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 4.png" alt="Фото 4"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 5.png" alt="Фото 5"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 6.png" alt="Фото 6"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 7.png" alt="Фото 7"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 8.png" alt="Фото 8"></div></div>

        <!-- Кнопка карты -->
        <div class="section"><div class="map-button-wrapper"><button class="btn-map" id="openMapBtn">Открыть карту</button></div></div>

        <!-- 4 изображения photo 9.png до photo 12.png -->
        <div class="section"><div class="image-placeholder"><img src="images/photo 9.png" alt="Фото 9"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 10.png" alt="Фото 10"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 11.png" alt="Фото 11"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 12.png" alt="Фото 12"></div></div>

        <!-- Таймер -->
        <div class="section">
            <h2 class="section-title">До торжества осталось</h2>
            <div class="countdown-wrapper">
                <div class="countdown-item"><div class="countdown-number" id="days">00</div><div class="countdown-label">Дней</div></div>
                <div class="countdown-item"><div class="countdown-number" id="hours">00</div><div class="countdown-label">Часов</div></div>
                <div class="countdown-item"><div class="countdown-number" id="minutes">00</div><div class="countdown-label">Минут</div></div>
                <div class="countdown-item"><div class="countdown-number" id="seconds">00</div><div class="countdown-label">Секунд</div></div>
            </div>
        </div>

        <!-- Опрос -->
        <div class="section">
            <h2 class="section-title">Пожалуйста, ответьте на вопросы</h2>
            <div class="poll-container">
                <div class="poll-question"><p>1. Ваше имя</p><input type="text" id="guestName" class="poll-input" placeholder="Напишите ваше имя"></div>
                <div class="poll-question"><p>2. Подтверждение присутствия</p><div class="radio-group">
                    <label class="radio-circle"><input type="radio" name="attendance" value="Буду с радостью"> <span>Буду с радостью</span></label>
                    <label class="radio-circle"><input type="radio" name="attendance" value="К сожалению, не смогу"> <span>К сожалению, не смогу</span></label>
                    <label class="radio-circle"><input type="radio" name="attendance" value="Возможно, уточню позже"> <span>Возможно, уточню позже</span></label>
                </div></div>
                <div class="poll-question"><p>3. Какой алкоголь предпочитаете? (можно несколько)</p><div class="poll-options">
                    <label class="checkbox-circle"><input type="checkbox" value="Вино красное"> Вино красное</label>
                    <label class="checkbox-circle"><input type="checkbox" value="Вино белое"> Вино белое</label>
                    <label class="checkbox-circle"><input type="checkbox" value="Шампанское"> Шампанское</label>
                    <label class="checkbox-circle"><input type="checkbox" value="Коньяк"> Коньяк</label>
                    <label class="checkbox-circle"><input type="checkbox" value="Виски"> Виски</label>
                    <label class="checkbox-circle"><input type="checkbox" value="Водка"> Водка</label>
                    <label class="checkbox-circle"><input type="checkbox" value="Самогон"> Самогон</label>
                </div></div>
                <button class="btn-submit-poll" id="submitPollBtn">Отправить ответ</button>
                <div class="poll-status" id="pollStatus"></div>
            </div>
        </div>

        <!-- 13 изображение в конце (photo 13.png) -->
        <div class="section"><div class="image-placeholder"><img src="images/photo 13.png" alt="Фото 13"></div></div>
    </div>

    <audio id="bgMusic" loop preload="auto" src="music/JElbrus_Dzhanmirzoev_-_Brodyaga_53297988.mp3" style="display: none;"></audio>

    <script>
        const targetDate = new Date(2026, 8, 26, 16, 0, 0);
        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('days').innerText = '00';
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                return;
            }
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000);
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);

        document.getElementById('openMapBtn').addEventListener('click', () => {
            window.open('https://yandex.ru/maps/?text=Уфа%20проспект%20Октября%2079/1%20Pravdahall', '_blank');
        });

        const TELEGRAM_TOKEN = '8987869878:AAFfutu4fXOzdSd-Vt-qVK3I_ZTcnTBMlls';
        const CHAT_ID = '825797973';

        document.getElementById('submitPollBtn').addEventListener('click', async () => {
            const name = document.getElementById('guestName').value.trim();
            if (!name) { 
                document.getElementById('pollStatus').innerText = 'Пожалуйста, укажите ваше имя'; 
                document.getElementById('pollStatus').style.color = '#b35f3b';
                return; 
            }
            const attendance = document.querySelector('input[name="attendance"]:checked')?.value || 'Не указано';
            const alcohol = [...document.querySelectorAll('.checkbox-circle input:checked')].map(c => c.value).join(', ') || 'Не выбрано';
            
            const message = `📨 НОВЫЙ ОТВЕТ НА ПРИГЛАШЕНИЕ%0A%0A👤 Имя: ${name}%0A✅ Присутствие: ${attendance}%0A🍷 Алкоголь: ${alcohol}`;
            
            try {
                document.getElementById('pollStatus').innerText = 'Отправка...';
                document.getElementById('pollStatus').style.color = '#6f5e4e';
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${message}`, {
                    method: 'GET'
                });
                
                if (response.ok) {
                    document.getElementById('pollStatus').innerText = 'Спасибо! Ваш ответ отправлен.';
                    document.getElementById('pollStatus').style.color = '#4c7a5c';
                    document.getElementById('guestName').value = '';
                    document.querySelectorAll('input[name="attendance"]').forEach(r => r.checked = false);
                    document.querySelectorAll('.checkbox-circle input').forEach(c => c.checked = false);
                } else {
                    document.getElementById('pollStatus').innerText = 'Ошибка отправки, попробуйте позже.';
                    document.getElementById('pollStatus').style.color = '#b35f3b';
                }
            } catch(e) {
                document.getElementById('pollStatus').innerText = 'Ошибка соединения. Попробуйте еще раз.';
                document.getElementById('pollStatus').style.color = '#b35f3b';
            }
        });

        const observer = new IntersectionObserver((e) => e.forEach(entry => { if(entry.isIntersecting) { setTimeout(() => entry.target.classList.add('visible'), 200); observer.unobserve(entry.target); } }), { threshold: 0.2 });
        document.querySelectorAll('.section').forEach(s => observer.observe(s));

        const music = document.getElementById('bgMusic');
        music.volume = 0.3;
        music.play().catch(() => document.addEventListener('click', () => music.play(), { once: true }));
    </script>
</body>
</html>
