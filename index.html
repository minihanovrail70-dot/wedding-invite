<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Свадебное приглашение</title>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('images/background3.jpg');
            background-repeat: repeat-y;
            background-size: 100% auto;
            background-position: top center;
            font-family: 'Montserrat', sans-serif;
            color: #2c2b28;
            line-height: 1.4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: transparent;
            padding: 0;
        }

        .section {
            margin-bottom: 0;
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .image-placeholder {
            width: 100%;
            background-color: transparent;
            min-height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            line-height: 0;
        }
        .image-placeholder img {
            width: 100%;
            height: auto;
            display: block;
        }

        h2, .section-title {
            font-family: 'Pangolin', cursive;
            font-size: 28px;
            margin-bottom: 20px;
            margin-top: 20px;
            font-weight: normal;
            text-align: center;
            color: #4a3729;
        }

        /* Увеличенный шрифт для АНКЕТА */
        .anketa-title {
            color: #ff0000;
            font-family: 'Pangolin', cursive;
            font-size: 33.6px;
            margin-bottom: 20px;
            margin-top: 20px;
            font-weight: normal;
            text-align: center;
        }

        /* Красный цвет для "До торжества осталось" */
        .countdown-title {
            color: #ff0000;
            font-family: 'Pangolin', cursive;
            font-size: 28px;
            margin-bottom: 20px;
            margin-top: 20px;
            font-weight: normal;
            text-align: center;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
            padding: 0 20px;
        }
        .countdown-item {
            flex: 1;
            text-align: center;
            padding: 12px 5px;
        }
        .countdown-number {
            font-size: 38px;
            font-weight: 400;
            color: #000000;
            font-family: 'Montserrat', sans-serif;
        }
        .countdown-label {
            font-size: 14px;
            text-transform: uppercase;
            margin-top: 8px;
            color: #000000;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
        }

        /* Кнопка карты - белая, овальная, тонкая черная обводка */
        .map-button-wrapper {
            text-align: center;
            margin: 20px 0;
            padding: 0 20px;
        }
        .btn-map {
            display: inline-block;
            background: #ffffff;
            border: 1px solid #000000;
            padding: 14px 32px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 18px;
            color: #000000;
            text-decoration: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .btn-map:hover {
            background: #f5f5f5;
        }

        /* Стили для Яндекс Формы */
        .ya-form-wrapper {
            margin: 20px 0;
            padding: 0 20px;
        }
        .ya-form-wrapper iframe {
            width: 100%;
            min-height: 600px;
            border: none;
            border-radius: 0;
        }

        @media (max-width: 550px) {
            .container { padding: 0; }
            .section { margin-bottom: 0; }
            .countdown-number { font-size: 28px; }
            .anketa-title { font-size: 30px; }
            .ya-form-wrapper iframe { min-height: 700px; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- 8 изображений photo 1.png до photo 8.png -->
        <div class="section"><div class="image-placeholder"><img src="images/photo 1.png" alt="Фото 1"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 2.png" alt="Фото 2"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 3.png" alt="Фото 3"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 4.png" alt="Фото 4"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 5.png" alt="Фото 5"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 6.png" alt="Фото 6"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 7.png" alt="Фото 7"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 8.png" alt="Фото 8"></div></div>

        <!-- Кнопка карты -->
        <div class="section"><div class="map-button-wrapper"><button class="btn-map" id="openMapBtn">Открыть карту</button></div></div>

        <!-- 4 изображения photo 9.png до photo 12.png -->
        <div class="section"><div class="image-placeholder"><img src="images/photo 9.png" alt="Фото 9"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 10.png" alt="Фото 10"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 11.png" alt="Фото 11"></div></div>
        <div class="section"><div class="image-placeholder"><img src="images/photo 12.png" alt="Фото 12"></div></div>

        <!-- Таймер (до 26.09.2026 15:00 по уфимскому времени) -->
        <div class="section">
            <h2 class="countdown-title">До торжества осталось</h2>
            <div class="countdown-wrapper">
                <div class="countdown-item"><div class="countdown-number" id="days">00</div><div class="countdown-label">Дней</div></div>
                <div class="countdown-item"><div class="countdown-number" id="hours">00</div><div class="countdown-label">Часов</div></div>
                <div class="countdown-item"><div class="countdown-number" id="minutes">00</div><div class="countdown-label">Минут</div></div>
                <div class="countdown-item"><div class="countdown-number" id="seconds">00</div><div class="countdown-label">Секунд</div></div>
            </div>
        </div>

        <!-- Опрос (Яндекс Формы) -->
        <div class="section">
            <h2 class="anketa-title">АНКЕТА</h2>
            <div class="ya-form-wrapper">
                <iframe src="https://forms.yandex.ru/u/6a414076505690e9970feab2?iframe=1" frameborder="0" name="ya-form-6a414076505690e9970feab2"></iframe>
            </div>
        </div>

        <!-- 13 изображение в конце (photo 13.png) -->
        <div class="section"><div class="image-placeholder"><img src="images/photo 13.png" alt="Фото 13"></div></div>
    </div>

    <!-- Скрипт Яндекс Формы -->
    <script src="https://forms.yandex.ru/_static/embed.js"></script>

    <script>
        // Время до 26 сентября 2026 15:00 по Уфимскому времени (UTC+5)
        const targetDate = new Date('2026-09-26T15:00:00+05:00');
        
        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('days').innerText = '00';
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                return;
            }
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000);
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);

        document.getElementById('openMapBtn').addEventListener('click', () => {
            window.open('https://yandex.ru/maps/?text=Республика%20Башкортостан%20городской%20округ%20Уфа%20Кировский%20район%20Верхнеторговая%20площадь%201%20этаж%202%20Art%20hall', '_blank');
        });

        const observer = new IntersectionObserver((e) => e.forEach(entry => { if(entry.isIntersecting) { setTimeout(() => entry.target.classList.add('visible'), 200); observer.unobserve(entry.target); } }), { threshold: 0.2 });
        document.querySelectorAll('.section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
